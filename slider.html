<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="banner">
        <div class="slider" style="--quantity: 10">
            <div class="item" style="--position: 1"><img src="slider_frames/s1.jpg" alt=""></div>
            <div class="item" style="--position: 2"><img src="slider_frames/s2.jpeg" alt=""></div>
            <div class="item" style="--position: 3"><img src="slider_frames/s3.jpeg" alt=""></div>
            <div class="item" style="--position: 4"><img src="slider_frames/s4.jpeg" alt=""></div>
            <div class="item" style="--position: 5"><img src="slider_frames/s5.jpeg" alt=""></div>
            <div class="item" style="--position: 6"><img src="slider_frames/s6.jpeg" alt=""></div>
            <div class="item" style="--position: 7"><img src="slider_frames/s7.jpeg" alt=""></div>
            <div class="item" style="--position: 8"><img src="slider_frames/s8.jpeg" alt=""></div>
            <div class="item" style="--position: 9"><img src="slider_frames/s9.jpeg" alt=""></div>
            <div class="item" style="--position: 10"><img src="slider_frames/s10.jpeg" alt=""></div>
        </div>
        <div class="model"></div>
    </div>
</body>
</html>
